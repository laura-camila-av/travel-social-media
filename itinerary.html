<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Itinerary</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Create Your Itinerary</h1>
    <h2>Plan your trip day by day</h2>
    <p>Fill in the details below to build your travel itinerary.</p>

    <form action="#" method="post" enctype="multipart/form-data">

        <h2>Trip Details</h2>

        <label for="trip-title">Itinerary Title</label><br>
        <input type="text" id="trip-title" name="trip-title" required><br><br>

        <label for="creator-name">Your Name</label><br>
        <input type="text" id="creator-name" name="creator-name" required><br><br>

        <label for="destination">Destination</label><br>
        <input type="text" id="destination" name="destination" required><br><br>

        <label for="start-date">Start Date</label><br>
        <input type="date" id="start-date" name="start-date" required><br><br>

        <label for="end-date">End Date</label><br>
        <input type="date" id="end-date" name="end-date" required><br><br>

        <h2>Day 1</h2>

        <label for="activities-day1">Activities</label><br>
        <textarea id="activities-day1" name="activities-day1" rows="4" required></textarea><br><br>

        <label for="cost-day1">Total Cost</label><br>
        <input type="number" id="cost-day1" name="cost-day1" min="0" step="0.01" required><br><br>

        <label for="rented-items-day1">Rented Items</label><br>
        <input type="text" id="rented-items-day1" name="rented-items-day1"><br><br>

        <label for="dining-day1">Dining</label><br>
        <input type="text" id="dining-day1" name="dining-day1"><br><br>

        <label for="transport-day1">Transport Taken</label><br>
        <input type="text" id="transport-day1" name="transport-day1" placeholder="e.g. Train, Bus, Taxi"><br><br>

        <label for="accommodation-day1">Accommodation (optional)</label><br>
        <input type="text" id="accommodation-day1" name="accommodation-day1"><br><br>

        <label for="photos-day1">Upload Photo</label><br>
        <input type="file" id="photos-day1" name="photos-day1" accept="image/*"><br><br>

        <label for="caption-day1">Photo Caption</label><br>
        <textarea id="caption-day1" name="caption-day1" rows="3"></textarea><br><br>

        <input type="submit" value="Submit Itinerary">
    </form>
</body>
</html>
