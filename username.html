<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Choose Username</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f6fb;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 16px;
      width: 350px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #667eea;
      color: white;
      cursor: pointer;
    }
    .msg {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Choose a Username</h2>
  <input type="text" id="username" placeholder="Enter username" />
  <button onclick="setUsername()">Save Username</button>
  <p class="msg" id="message"></p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import {
    getFirestore,
    doc,
    getDoc,
    setDoc
  } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  // SAME CONFIG AS YOUR MAIN PAGE
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.setUsername = async function () {
    const username = document.getElementById("username").value.trim();
    const message = document.getElementById("message");

    if (!username) {
      message.textContent = "Enter a username.";
      return;
    }

    try {
      // 🔍 Check if username exists
      const usernameRef = doc(db, "usernames", username);
      const usernameSnap = await getDoc(usernameRef);

      if (usernameSnap.exists()) {
        message.textContent = "Username already taken ❌";
        return;
      }

      // ✅ Save username
      const user = auth.currentUser;

      if (!user) {
        message.textContent = "Not logged in.";
        return;
      }

      // Save username → UID mapping
      await setDoc(doc(db, "usernames", username), {
        uid: user.uid
      });

      // Save username inside user profile
      await setDoc(doc(db, "users", user.uid), {
        username: username
      });

      message.textContent = "Username saved ✅";

      // Redirect to home
      setTimeout(() => {
        window.location.href = "home.html";
      }, 1000);

    } catch (error) {
      message.textContent = error.message;
    }
  };
</script>

</body>
</html>
