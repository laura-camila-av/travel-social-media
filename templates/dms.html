<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMs</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="../static/styles.css">
</head>

<body class="dms-body">

  <div class="navigation-bar">
    <ul>
      <li><a href="{{ url_for('user_profile') }}">Your Profile</a></li>
      <li><a href="{{ url_for('itinerary_create') }}">Create Itinerary</a></li>
      <li><a href="{{ url_for('dms') }}">Messages</a></li>
      <li><a href="{{ url_for('feed') }}">Feed</a></li>
      <li><a href="{{ url_for('search') }}">Search</a></li>
      <li><a href="#">Notifications</a></li>
      <li><a href="#">Log Out</a></li>
    </ul>
  </div>

  <div class="page-wrapper" style="width: calc(100% - 200px);">

    <div class="dms-sidebar">
      <h2 class="dms-sidebar-title">Users</h2>
      <div id="userList"></div>
    </div>

    <div class="dms-chat-area">
      <div class="dms-chat-header" id="chatHeader">Select a user</div>

      <div class="dms-messages" id="messages">
        <div class="dms-empty">Choose someone to start chatting.</div>
      </div>

      <form class="dms-composer" id="messageForm">
        <input type="text" id="messageInput" placeholder="Type a message..." required />
        <button type="submit">Send</button>
      </form>
    </div>

  </div>

  <script>
    const userList = document.getElementById("userList");
    const chatHeader = document.getElementById("chatHeader");
    const messagesDiv = document.getElementById("messages");
    const messageForm = document.getElementById("messageForm");
    const messageInput = document.getElementById("messageInput");

    let selectedUserId = null;

    async function loadUsers() {
      const response = await fetch("/api/users");
      const users = await response.json();

      userList.innerHTML = "";

      if (users.length === 0) {
        userList.innerHTML = '<div class="dms-empty">No other users found.</div>';
        return;
      }

      users.forEach((user) => {
        const userEl = document.createElement("div");
        userEl.className = "user";
        userEl.textContent = user.username || user.email || "Unnamed user";

        userEl.addEventListener("click", async () => {
          selectedUserId = user.id;
          chatHeader.textContent = "Chat with " + (user.username || user.email);
          await loadMessages();
        });

        userList.appendChild(userEl);
      });
    }

    async function loadMessages() {
      if (!selectedUserId) return;

      const response = await fetch(`/api/messages/${selectedUserId}`);
      const messages = await response.json();

      messagesDiv.innerHTML = "";

      if (messages.length === 0) {
        messagesDiv.innerHTML = '<div class="dms-empty">No messages yet.</div>';
        return;
      }

      messages.forEach((msg) => {
        const msgEl = document.createElement("div");

        msgEl.className = "dms-message " + (msg.is_mine ? "dms-mine" : "dms-theirs");

        msgEl.textContent = msg.text;
        messagesDiv.appendChild(msgEl);
      });

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    messageForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const text = messageInput.value.trim();
      if (!text || !selectedUserId) return;

      const response = await fetch("/api/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          receiver_id: selectedUserId,
          text: text
        })
      });

      if (response.ok) {
        messageInput.value = "";
        await loadMessages();
      }
    });

    loadUsers();

    setInterval(() => {
      if (selectedUserId) {
        loadMessages();
      }
    }, 3000);
  </script>

</body>
</html>
