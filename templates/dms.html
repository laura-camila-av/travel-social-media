<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMs</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body class="dms-body">
  <!--Navigation bar-->
  {% include 'navbar.html' %}

<div class="page-wrapper" style="width: calc(100% - 200px);">

  <div class="dms-sidebar">
    <h2 class="dms-sidebar-title">Users</h2>
    <div id="userList"></div>
  </div>

  <div class="dms-chat-area">
    <div class="dms-chat-header" id="chatHeader">Select a user</div>

    <div class="dms-messages" id="messages">
      <div class="dms-empty">Choose someone to start chatting.</div>
    </div>

    <form class="dms-composer" id="messageForm">
      <input type="text" id="messageInput" placeholder="Select a user first..." required disabled />
      <button type="submit" id="sendButton" disabled>Send</button>
    </form>
  </div>

</div>

<script>
  const userList = document.getElementById("userList");
  const chatHeader = document.getElementById("chatHeader");
  const messagesDiv = document.getElementById("messages");
  const messageForm = document.getElementById("messageForm");
  const messageInput = document.getElementById("messageInput");
  const sendButton = document.getElementById("sendButton");

  let selectedUserId = null;

  async function loadUsers() {
    const response = await fetch("/api/users");
    const users = await response.json();

    userList.innerHTML = "";

    if (users.length === 0) {
      userList.innerHTML = '<div class="dms-empty">No other users found.</div>';
      return;
    }

    users.forEach((user) => {
      const userEl = document.createElement("div");
      userEl.className = "user";
      userEl.textContent = user.username || user.email || "Unnamed user";

      userEl.addEventListener("click", async () => {
        selectedUserId = user.id;

        document.querySelectorAll(".user").forEach(el => {
          el.classList.remove("active-user");
        });
        userEl.classList.add("active-user");

        chatHeader.textContent = "Chat with " + (user.username || user.email);

        messageInput.disabled = false;
        sendButton.disabled = false;
        messageInput.placeholder = "Type a message...";
        messageInput.focus();

        await loadMessages();
      });

      userList.appendChild(userEl);
    });
  }

  async function loadMessages() {
    if (!selectedUserId) return;

    const response = await fetch(`/api/messages/${selectedUserId}`);
    const messages = await response.json();

    messagesDiv.innerHTML = "";

    if (messages.length === 0) {
      messagesDiv.innerHTML = '<div class="dms-empty">No messages yet.</div>';
      return;
    }

    messages.forEach((msg) => {
      const msgEl = document.createElement("div");
      msgEl.className = "dms-message " + (msg.is_mine ? "dms-mine" : "dms-theirs");
      msgEl.textContent = msg.text;
      messagesDiv.appendChild(msgEl);
    });

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  messageForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const text = messageInput.value.trim();

    if (!selectedUserId) {
      alert("Please select a user first.");
      return;
    }

    if (!text) {
      return;
    }

    const response = await fetch("/api/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        receiver_id: selectedUserId,
        text: text
      })
    });

    if (response.ok) {
      messageInput.value = "";
      await loadMessages();
    } else {
      alert("Message failed to send.");
    }
  });

  loadUsers();

  setInterval(() => {
    if (selectedUserId) {
      loadMessages();
    }
  }, 3000);
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
