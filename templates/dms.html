<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="{{ csrf_token() }}">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

  <title>Messages</title>
</head>

<body class="dms-body">
{% include 'navbar.html' %}

<div class="page-wrapper dms-page-wrapper">

  <aside class="dms-sidebar">
    <div class="dms-sidebar-header">
      <div>
        <p class="eyebrow">Tripster Chat</p>
        <h2 class="dms-sidebar-title">Messages</h2>
      </div>
      <i class="fa-solid fa-comments dms-sidebar-icon"></i>
    </div>

    <p class="dms-sidebar-subtitle">
      Select a user to start or continue a conversation.
    </p>

    <div id="userList" class="dms-user-list"></div>
  </aside>

  <main class="dms-chat-area">
    <div class="dms-chat-header" id="chatHeader">
      <div class="dms-chat-placeholder-header">
        <i class="fa-solid fa-message"></i>
        <span>Select a user</span>
      </div>
    </div>

    <div class="dms-messages" id="messages">
      <div class="dms-empty">
        <i class="fa-regular fa-comments"></i>
        <p>Choose someone to start chatting.</p>
      </div>
    </div>

    <div id="replyPreview" class="reply-preview hidden">
      <span id="replyPreviewText"></span>
      <button type="button" onclick="cancelReply()">✕</button>
    </div>

    <form class="dms-composer" id="messageForm">
      <input
              type="text"
              id="messageInput"
              placeholder="Select a user first..."
              required
              disabled
      />
      <button type="submit" id="sendButton" disabled>
        <i class="fa-solid fa-paper-plane"></i>
        Send
      </button>
    </form>
  </main>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='dms.js') }}"></script>
</body>
</html>
