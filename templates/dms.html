<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>DMs</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body class="dms-body">
  <!--Navigation bar-->
  {% include 'navbar.html' %}

<div class="page-wrapper" style="width: calc(100% - 200px);">

  <div class="dms-sidebar">
    <h2 class="dms-sidebar-title">Users</h2>
    <div id="userList"></div>
  </div>

  <div class="dms-chat-area">
    <div class="dms-chat-header" id="chatHeader">Select a user</div>

    <div class="dms-messages" id="messages">
      <div class="dms-empty">Choose someone to start chatting.</div>
    </div>

    <form class="dms-composer" id="messageForm">
      <input type="text" id="messageInput" placeholder="Select a user first..." required disabled />
      <button type="submit" id="sendButton" disabled>Send</button>
    </form>
  </div>

</div>

<script>
  const drafts = {};
  const userList = document.getElementById("userList");
  const chatHeader = document.getElementById("chatHeader");
  const messagesDiv = document.getElementById("messages");
  const messageForm = document.getElementById("messageForm");
  const messageInput = document.getElementById("messageInput");
  const sendButton = document.getElementById("sendButton");
  const csrfToken = document.querySelector('meta[name="csrf-token"]').content;
  let selectedUserId = null;

  async function loadUsers() {
    const response = await fetch("/api/users");
    const users = await response.json();

    userList.innerHTML = "";

    if (users.length === 0) {
      userList.innerHTML = '<div class="dms-empty">No other users found.</div>';
      return;
    }

    users.forEach((user) => {
      const userEl = document.createElement("div");
      userEl.className = "user";
      const nameSpan = document.createElement("span");
      nameSpan.textContent = user.username || user.email || "Unnamed user";

      userEl.appendChild(nameSpan);

      if (user.unread_count > 0) {
        const dot = document.createElement("span");
        dot.className = "unread-dot";
        userEl.appendChild(dot);
      }

      userEl.addEventListener("click", async () => {
        // save current draft
        if (selectedUserId){
          drafts[selectedUserId] = messageInput.value;
        }
        selectedUserId = user.id;

        document.querySelectorAll(".user").forEach(el => {
          el.classList.remove("active-user");
        });
        userEl.classList.add("active-user");

        chatHeader.innerHTML = `Chat with <a href="/user/${user.id}" class="chat-profile-link">${user.username || user.email}</a>`;
        messageInput.value = ""; // clears unsent message when switching chat
        messageInput.disabled = false;
        sendButton.disabled = false;
        messageInput.placeholder = "Type a message...";
        messageInput.value = drafts[user.id] || ""; // restore draft for this user
        messageInput.focus();

        await loadMessages();
      });

      userList.appendChild(userEl);
    });
  }

  async function loadMessages() {
    if (!selectedUserId) return;

    const response = await fetch(`/api/messages/${selectedUserId}`);
    const messages = await response.json();

    messagesDiv.innerHTML = "";

    if (messages.length === 0) {
      messagesDiv.innerHTML = '<div class="dms-empty">No messages yet.</div>';
      return;
    }

    messages.forEach((msg) => {
      const wrapper = document.createElement("div");
      wrapper.className = "dms-message-wrapper " + (msg.is_mine ? "mine-wrapper" : "theirs-wrapper");

      const msgEl = document.createElement("div");
      msgEl.className = "dms-message " + (msg.is_mine ? "dms-mine" : "dms-theirs");

      const textEl = document.createElement("span");
      textEl.textContent = msg.text;
      msgEl.appendChild(textEl);

      if (msg.reaction) {
        const reactionEl = document.createElement("span");
        reactionEl.className = "message-reaction";
        reactionEl.textContent = msg.reaction;
        msgEl.appendChild(reactionEl);
      }

      const reactionBar = document.createElement("div");
      reactionBar.className = "reaction-bar";

      ["❤️", "😂", "😮", "😢", "👍"].forEach((emoji) => {
        const reactionBtn = document.createElement("button");
        reactionBtn.type = "button";
        reactionBtn.className = "reaction-btn";
        reactionBtn.textContent = emoji;

        reactionBtn.addEventListener("click", async () => {
          await reactToMessage(msg.id, emoji);
        });

        reactionBar.appendChild(reactionBtn);
      });

      wrapper.appendChild(msgEl);
      wrapper.appendChild(reactionBar);
      messagesDiv.appendChild(wrapper);
    });

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  messageForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const text = messageInput.value.trim();

    if (!selectedUserId) {
      alert("Please select a user first.");
      return;
    }

    if (!text) {
      return;
    }

    const response = await fetch("/api/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrfToken
      },
      body: JSON.stringify({
        receiver_id: selectedUserId,
        text: text
      })
    });

    if (response.ok) {
      messageInput.value = "";
      await loadMessages();
    } else {
      alert("Message failed to send.");
    }
  });

  loadUsers();

  setInterval(() => {
    if (selectedUserId) {
      loadMessages();
    }
  }, 3000);

  async function reactToMessage(messageId, reaction) {
    const response = await fetch(`/api/messages/${messageId}/react`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrfToken
      },
      body: JSON.stringify({
        reaction: reaction
      })
    });

    if (response.ok) {
      await loadMessages();
    }
  }
</script>

</body>
</html>
