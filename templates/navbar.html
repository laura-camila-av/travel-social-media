            alt="Website Logo"

    </div>
</div>

<!-- LOGOUT MODAL -->
<div id="logoutModal" class="modal hidden">
    <div class="logout-modal-box">
        <p>Are you sure you want to log out?</p>
        <div class="logout-modal-buttons">
            <button class="btn-confirm" onclick="confirmLogout()">Yes</button>
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- LOGOUT + NAVBAR SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", function () {
    const logoutLink = document.getElementById("logoutLink");
    const modal = document.getElementById("logoutModal");
    const navbar = document.getElementById("navbar");
    const toggleBtn = document.getElementById("navbarToggle");

    // --- Logout ---
    if (logoutLink && modal) {
        logoutLink.addEventListener("click", function (e) {
            e.preventDefault();
            modal.classList.remove("hidden");
        });
    }

    // --- Navbar: click toggle to pin open/closed ---
    toggleBtn.addEventListener("click", function () {
        navbar.classList.toggle("pinned");
    });

    // --- Navbar: hover to temporarily expand ---
    navbar.addEventListener("mouseenter", function () {
        navbar.classList.add("hovered");
    });
    navbar.addEventListener("mouseleave", function () {
        navbar.classList.remove("hovered");
    });
});

function closeModal() {
    document.getElementById("logoutModal").classList.add("hidden");
}

function confirmLogout() {
    window.location.href = "{{ url_for('logout') }}";
}
</script>
