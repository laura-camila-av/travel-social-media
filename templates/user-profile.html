<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../static/styles.css">
</head>
<style>
    .bio-editing {
    outline: 2px solid #e43d12;
    border-radius: 5px;
    padding: 8px;
    }
</style>

<body>
     <!--Navigation bar-->
    <div class ="navigation-bar">
        <ul>
            <li><a href="{{ url_for('user_profile') }}">Your Profile</a></li>
            <li><a href="{{ url_for('itinerary_create') }}">Create Itinerary</a></li>
            <li><a href="{{ url_for('dms') }}">Messages</a></li>
            <li><a href="{{url_for('feed')}}">Feed</a></li>
            <li><a href="{{ url_for('search') }}">Search</a></li>
            <li><a href="#">Notifications</a></li>
            <li><a href="#">Log Out</a></li>
        </ul>
    </div>

    <!-- Website Title -->
    <div class="page-wrapper">
        <div class="middle-column">
            <h1>Website Name</h1>

    <!-- Profile Section -->
        <div class="profile-section">
            <div class="profile-pic"></div>
            <h2 class="username">Username</h2>
        </div>

    <!-- Bio -->
   <div class="bio-wrapper">
        <p class="bio" id="bio-text">
            Biography Biography Biography...
        </p>
        <span class="tooltip-text">Double-click to edit</span>
    </div>

    <!-- Itineraries -->
        <h2>Your Itineraries</h2>

<div class="itinerary-container">
    <a class="card-link" href="{{ url_for('itinerary_display', itinerary_id=1) }}">
        <div class="itinerary-card">
            <div class="overlay-text">Itinerary Title</div>
        </div>
    </a>
    <a class="card-link" href="{{ url_for('itinerary_display', itinerary_id=1) }}">
        <div class="itinerary-card">
            <div class="overlay-text">Itinerary Title</div>
        </div>
    </a>
    <a class="card-link" href="{{ url_for('itinerary_display', itinerary_id=1) }}">
        <div class="itinerary-card">
            <div class="overlay-text">Itinerary Title</div>
        </div>
    </a>
</div>
        </div>

    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
        $('#bio-text').dblclick(function() {
            $(this).attr('contenteditable', 'true');
            $(this).focus();
            $(this).addClass('bio-editing');
        });

        $('#bio-text').on('blur', function() {
            $(this).attr('contenteditable', 'false');
            $(this).removeClass('bio-editing');
            // later: save to database via AJAX here
        });
    </script>
</body>
</html>
