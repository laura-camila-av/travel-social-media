<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
     <!--Navigation bar-->
    <div class ="navigation-bar">
        <ul>
            <li><a href="TBC">Your Profile</a></li>
            <li><a href="TBC">Create Itinerary</a></li>
            <li><a href="TBC">Messages</a></li>
            <li><a href="TBC">Feed</a></li>
            <li><a href="TBC">Notifications</a></li>
            <li><a href="TBC">Log Out</a></li>
        </ul>
    </div>
    
    <h1><strong>Website Name</strong> </h1>

    <!-- Profile Button -->
    <div class="account-buttons">
        <a href="#" class="btn">Profile</a>
    </div>

    <!-- Title -->
    <h2>Itinerary Title</h2>

    <div class="itinerary-page">

        <!-- LEFT: Day thumbnails -->
        <div class="day-thumbnails">
            <div class="day-card">
                <div class="overlay-text">Day 2</div>
            </div>
            <div class="day-card">
                <div class="overlay-text">Day 3</div>
            </div>
            <div class="day-card">
                <div class="overlay-text">Day 4</div>
            </div>
            <div class="day-card">
                <div class="overlay-text">Day 5</div>
            </div>
            <div class="day-card">
                <div class="overlay-text">Day 6</div>
            </div>
        </div>

        <!-- CENTER: Main image -->
        <div class="main-image">
            <div class="overlay-text">Day 1</div>
        </div>

        <!-- RIGHT: Day breakdown -->
        <div class="day-details">
            <h2>Day 1</h2>

            <div class="time-block">Morning</div>
            <div class="time-block">Afternoon</div>
            <div class="time-block">Evening</div>
        </div>

    </div>

    <!-- Bottom creator section -->
    <div class="creator-section">
        <div class="creator-pic"></div>
        <p>@Creator_username</p>
    </div>

</body>
</html>
